<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>Lands Digital Architecture — 3D Ecosystem Map</title>
<style>
:root{
  --bg0:#050813; --bg1:#0a1024; --ink:#e8f0ff; --muted:#8ea3c6;
  --panel:rgba(10,17,38,.82); --panel-brd:rgba(90,140,220,.22);
  --backbone:#22d3ee; --core_land:#3b82f6; --environ:#34d399; --financial:#f5c542;
  --security:#a78bfa; --thirdparty:#fb923c; --viewer:#f472b6; --content:#94a3b8; --regulator:#ef4444;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;background:var(--bg0);color:var(--ink);
  font-family:"Space Grotesk",ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
#stage{position:fixed;inset:0}
canvas{display:block}

/* ---- ambient gradient behind canvas ---- */
#bgwrap{position:fixed;inset:0;z-index:-2;
  background:
   radial-gradient(1200px 800px at 62% 18%, #10204a 0%, rgba(7,12,30,0) 60%),
   radial-gradient(900px 700px at 20% 90%, #0c1b33 0%, rgba(7,12,30,0) 55%),
   linear-gradient(180deg,#060a19 0%,#04060f 100%);}
#vign{position:fixed;inset:0;z-index:-1;pointer-events:none;
  box-shadow:inset 0 0 320px 60px rgba(0,0,0,.85)}

/* ---- HUD ---- */
.hud{position:fixed;z-index:10;color:var(--ink)}
#topbar{top:0;left:0;right:0;display:flex;align-items:center;gap:16px;
  padding:14px 18px;pointer-events:none}
#brand{pointer-events:auto}
#brand .kick{font:600 10.5px/1 "Space Mono",ui-monospace,monospace;letter-spacing:.32em;
  color:var(--backbone);text-transform:uppercase;opacity:.85}
#brand h1{margin:3px 0 0;font-size:16.5px;font-weight:600;letter-spacing:.2px}
#brand h1 b{color:#bfe9ff;font-weight:700}
#brand .sub{font:500 11px/1.3 "Space Mono",monospace;color:var(--muted);margin-top:3px;letter-spacing:.02em}
#classif{margin-left:auto;pointer-events:auto;display:flex;gap:8px;align-items:center}
.badge{font:600 10px/1 "Space Mono",monospace;letter-spacing:.14em;text-transform:uppercase;
  padding:6px 9px;border-radius:6px;border:1px solid var(--panel-brd);background:var(--panel);color:var(--muted)}
.badge.pa{color:#ffd98a;border-color:rgba(245,197,66,.4)}

/* search */
#searchwrap{pointer-events:auto;position:relative}
#search{width:230px;background:var(--panel);border:1px solid var(--panel-brd);border-radius:9px;
  color:var(--ink);font:500 12.5px/1 "Space Grotesk",sans-serif;padding:10px 12px 10px 32px;outline:none;
  backdrop-filter:blur(8px)}
#search:focus{border-color:rgba(34,211,238,.55);box-shadow:0 0 0 3px rgba(34,211,238,.12)}
#searchwrap svg{position:absolute;left:10px;top:9px;width:14px;height:14px;opacity:.6}
#results{position:absolute;top:42px;left:0;width:230px;max-height:240px;overflow:auto;
  background:var(--panel);border:1px solid var(--panel-brd);border-radius:9px;backdrop-filter:blur(8px);
  display:none}
#results .r{padding:9px 12px;font-size:12.5px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.04)}
#results .r:hover{background:rgba(34,211,238,.10)}
#results .r small{display:block;color:var(--muted);font-size:10.5px;margin-top:2px}

/* legend / filters */
#legend{left:18px;top:96px;width:214px;pointer-events:auto;
  background:var(--panel);border:1px solid var(--panel-brd);border-radius:12px;backdrop-filter:blur(9px);
  padding:12px 12px 8px}
#legend h3{margin:0 0 9px;font:600 10px/1 "Space Mono",monospace;letter-spacing:.22em;color:var(--muted);text-transform:uppercase}
.lg{display:flex;align-items:center;gap:9px;padding:5px 6px;border-radius:7px;cursor:pointer;user-select:none;
  font-size:12px;transition:background .12s}
.lg:hover{background:rgba(255,255,255,.05)}
.lg .dot{width:10px;height:10px;border-radius:50%;box-shadow:0 0 8px currentColor;flex:0 0 auto}
.lg.off{opacity:.34}
.lg .n{flex:1}
.lg .c{font:500 10px/1 "Space Mono",monospace;color:var(--muted)}

/* detail panel */
#detail{right:0;top:0;bottom:0;width:344px;transform:translateX(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);
  pointer-events:auto;background:linear-gradient(180deg,rgba(10,17,40,.94),rgba(7,11,26,.96));
  border-left:1px solid var(--panel-brd);backdrop-filter:blur(14px);display:flex;flex-direction:column}
#detail.open{transform:translateX(0)}
#detail .dh{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,.06);position:relative}
#detail .cat{font:600 10px/1 "Space Mono",monospace;letter-spacing:.18em;text-transform:uppercase}
#detail h2{margin:9px 0 2px;font-size:21px;font-weight:700;letter-spacing:.2px}
#detail .full{color:var(--muted);font-size:12.5px;line-height:1.45}
#detail .dclose{position:absolute;top:16px;right:16px;width:28px;height:28px;border-radius:8px;
  border:1px solid var(--panel-brd);background:rgba(255,255,255,.03);color:var(--muted);cursor:pointer;
  font-size:15px;line-height:26px;text-align:center}
#detail .dclose:hover{color:var(--ink);border-color:rgba(255,255,255,.2)}
#detail .db{padding:16px 20px;overflow:auto;flex:1}
#detail .desc{font-size:13.5px;line-height:1.6;color:#d4e0f5}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin:14px 0 4px}
.chip{font:600 10px/1 "Space Mono",monospace;letter-spacing:.06em;padding:5px 8px;border-radius:20px;
  border:1px solid var(--panel-brd);color:var(--muted);text-transform:uppercase}
.chip.shared{color:#9be9ff;border-color:rgba(34,211,238,.4)}
#detail h4{margin:20px 0 8px;font:600 10px/1 "Space Mono",monospace;letter-spacing:.2em;color:var(--muted);text-transform:uppercase}
.flow{display:flex;gap:9px;align-items:flex-start;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);
  font-size:12px;cursor:pointer}
.flow:hover .fname{color:#bfe9ff}
.flow .arr{font-family:"Space Mono",monospace;color:var(--muted);flex:0 0 auto;padding-top:1px}
.flow .fname{font-weight:600}
.flow .flabel{color:var(--muted);font-size:11px;line-height:1.4;margin-top:1px}

/* annotation cards */
.note{position:fixed;z-index:8;width:210px;pointer-events:auto;transform:translate(-50%,-100%);
  background:linear-gradient(180deg,rgba(14,22,48,.94),rgba(9,14,32,.94));
  border:1px solid rgba(34,211,238,.28);border-radius:11px;padding:11px 12px;
  box-shadow:0 10px 40px rgba(0,0,0,.5),0 0 0 1px rgba(34,211,238,.06);backdrop-filter:blur(8px);
  opacity:0;transition:opacity .3s;display:none}
.note.show{display:block;opacity:1}
.note .nt{font:700 11.5px/1.2 "Space Grotesk",sans-serif;margin-bottom:5px;display:flex;align-items:center;gap:6px}
.note .tag{font:700 8.5px/1 "Space Mono",monospace;letter-spacing:.1em;padding:3px 5px;border-radius:5px;text-transform:uppercase}
.note.insight .tag{background:rgba(34,211,238,.16);color:#8fe9ff}
.note.risk .tag{background:rgba(239,68,68,.16);color:#ff9d9d}
.note.future .tag{background:rgba(167,139,250,.16);color:#c6b6ff}
.note .nx{font-size:11.5px;line-height:1.5;color:#c4d3ec}

/* node labels */
.lbl{position:fixed;z-index:6;pointer-events:none;transform:translate(-50%,-50%);
  font:600 11px/1 "Space Grotesk",sans-serif;letter-spacing:.2px;white-space:nowrap;
  color:#eaf3ff;text-shadow:0 1px 3px rgba(0,0,0,.9),0 0 10px rgba(0,0,0,.7);
  padding:2px 6px;border-radius:5px;transition:opacity .18s}
.lbl.shared{font-weight:700;font-size:12px}
.lbl.dim{opacity:.14}
.lbl.hidden{opacity:0}
.dlbl{position:fixed;z-index:5;pointer-events:none;transform:translate(-50%,-50%);
  font:700 10px/1 "Space Mono",monospace;letter-spacing:.24em;text-transform:uppercase;
  color:rgba(150,190,255,.5);text-shadow:0 0 12px rgba(0,0,0,.8)}

/* tooltip */
#tip{position:fixed;z-index:9;pointer-events:none;display:none;transform:translate(12px,12px);
  background:var(--panel);border:1px solid var(--panel-brd);border-radius:8px;padding:8px 11px;
  font-size:12px;backdrop-filter:blur(8px);max-width:230px;box-shadow:0 8px 24px rgba(0,0,0,.5)}
#tip .tn{font-weight:700}#tip .tc{font:500 10px/1 "Space Mono",monospace;color:var(--muted);margin-top:3px}

/* bottom controls */
#dock{left:50%;bottom:16px;transform:translateX(-50%);pointer-events:auto;display:flex;gap:8px;
  background:var(--panel);border:1px solid var(--panel-brd);border-radius:12px;padding:7px;backdrop-filter:blur(9px)}
.tool{display:flex;align-items:center;gap:7px;padding:8px 12px;border-radius:8px;cursor:pointer;
  font:600 11.5px/1 "Space Grotesk",sans-serif;color:var(--muted);border:1px solid transparent;user-select:none;
  transition:all .14s}
.tool:hover{color:var(--ink);background:rgba(255,255,255,.05)}
.tool.on{color:#bfe9ff;border-color:rgba(34,211,238,.35);background:rgba(34,211,238,.08)}
.tool .k{width:7px;height:7px;border-radius:50%;background:currentColor;box-shadow:0 0 7px currentColor}

#hint{right:18px;bottom:16px;pointer-events:none;font:500 11px/1.5 "Space Mono",monospace;color:var(--muted);
  text-align:right;opacity:.7;max-width:220px}

/* loader */
#loader{position:fixed;inset:0;z-index:50;background:var(--bg0);display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:18px;transition:opacity .6s}
#loader.gone{opacity:0;pointer-events:none}
#loader .ring{width:46px;height:46px;border-radius:50%;border:2px solid rgba(34,211,238,.15);
  border-top-color:var(--backbone);animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loader .lt{font:600 11px/1 "Space Mono",monospace;letter-spacing:.24em;color:var(--muted);text-transform:uppercase}

@media (max-width:760px){
  #legend{display:none}#hint{display:none}
  #detail{width:100%}#search{width:150px}#results{width:150px}
  #brand .sub{display:none}
  #dock{flex-wrap:wrap;justify-content:center;max-width:94vw}
}
</style>
</head>
<body>
<div id="bgwrap"></div><div id="vign"></div>
<div id="stage"></div>

<div id="loader"><div class="ring"></div><div class="lt">Assembling architecture</div></div>

<!-- HUD -->
<div id="topbar" class="hud">
  <div id="brand">
    <div class="kick">Forestry &amp; Parks · Lands Division</div>
    <h1>Digital Architecture <b>Atlas</b></h1>
    <div class="sub">11 ecosystems · 66 systems · 107 data flows — unified</div>
  </div>
  <div id="classif">
    <div id="searchwrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="search" placeholder="Search a system…" autocomplete="off"/>
      <div id="results"></div>
    </div>
    <span class="badge pa">Protected A</span>
  </div>
</div>

<div id="legend" class="hud"><h3>Layers</h3><div id="lgrows"></div></div>

<div id="detail" class="hud">
  <div class="dh"><div class="dclose" id="dclose">✕</div>
    <div class="cat" id="dcat"></div><h2 id="dname"></h2><div class="full" id="dfull"></div>
  </div>
  <div class="db">
    <div class="chips" id="dchips"></div>
    <div class="desc" id="ddesc"></div>
    <h4 id="dflowh" style="display:none">Data flows</h4>
    <div id="dflows"></div>
  </div>
</div>

<div id="tip" class="hud"><div class="tn"></div><div class="tc"></div></div>

<div id="dock" class="hud">
  <div class="tool on" id="t-flows"><span class="k"></span>Data flow</div>
  <div class="tool on" id="t-labels"><span class="k"></span>Labels</div>
  <div class="tool on" id="t-notes"><span class="k"></span>Insights</div>
  <div class="tool" id="t-reset"><span class="k"></span>Reset view</div>
</div>
<div id="hint" class="hud">drag · orbit  ·  scroll · zoom<br>right-drag · pan  ·  click node · inspect</div>

  const g=x.createRadialGradient(64,64,0,64,64,64);
  g.addColorStop(0,'rgba(255,255,255,1)');g.addColorStop(.25,'rgba(255,255,255,.75)');
  g.addColorStop(.55,'rgba(255,255,255,.22)');g.addColorStop(1,'rgba(255,255,255,0)');
  x.fillStyle=g;x.fillRect(0,0,128,128);return new THREE.CanvasTexture(c);
})();

/* ---------- build nodes ---------- */
const nodesById={}, nodeMeshes=[];
const NODE_GROUP=new THREE.Group();scene.add(NODE_GROUP);

MODEL.systems.forEach(s=>{
  const col=hex(s.cat);
  const size=s.shared?7.2:4.6;
  const geo=s.shared?new THREE.IcosahedronGeometry(size,1):new THREE.OctahedronGeometry(size,0);
  const mat=new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:.55,
    metalness:.5,roughness:.28,flatShading:true});
  const m=new THREE.Mesh(geo,mat);
  m.position.set(s.pos[0],s.pos[1],s.pos[2]);
  m.userData=s;
  // wireframe shell
  const wf=new THREE.LineSegments(new THREE.WireframeGeometry(geo),
    new THREE.LineBasicMaterial({color:col,transparent:true,opacity:.35}));
  m.add(wf);
  // glow
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:glowTex,color:col,transparent:true,
    opacity:s.shared?.9:.6,blending:THREE.AdditiveBlending,depthWrite:false}));
  sp.scale.setScalar(s.shared?42:26);m.add(sp);
  m.userData._mat=mat;m.userData._wf=wf;m.userData._glow=sp;m.userData._base=size;
  NODE_GROUP.add(m);nodeMeshes.push(m);nodesById[s.id]=m;
  // DOM label
  const el=document.createElement('div');el.className='lbl'+(s.shared?' shared':'');
  el.textContent=s.name;document.body.appendChild(el);m.userData._lbl=el;
});

/* ---------- district floor labels ---------- */
const dLabels=[];
MODEL.dmarkers.forEach(d=>{
  // ring
  const ring=new THREE.Mesh(new THREE.RingGeometry(52,54,64),
    new THREE.MeshBasicMaterial({color:0x2f6bb0,transparent:true,opacity:.28,side:THREE.DoubleSide}));
  ring.rotation.x=-Math.PI/2;ring.position.set(d.x,-1.4,d.z);scene.add(ring);
  const el=document.createElement('div');el.className='dlbl';el.textContent=d.name.replace(' Ecosystem','');
  document.body.appendChild(el);dLabels.push({el,pos:new THREE.Vector3(d.x,2,d.z)});
});

/* ---------- links + flowing particles ---------- */
const LINK_GROUP=new THREE.Group();scene.add(LINK_GROUP);
const flows=[];
const KINDBEND={spatial:26,extract:34,plan:20,doc:22,financial:24,auth:18,future:30,data:22};
MODEL.links.forEach(l=>{
  const A=nodesById[l.a], B=nodesById[l.b]; if(!A||!B) return;
  const pa=A.position, pb=B.position;
  const mid=pa.clone().add(pb).multiplyScalar(.5);
  const dist=pa.distanceTo(pb);
  mid.y+=Math.min(dist*0.28,60)+(KINDBEND[l.kind]||22);
  const curve=new THREE.QuadraticBezierCurve3(pa.clone(),mid,pb.clone());
  const col=hex(A.userData.cat);
  // static wire
  const pts=curve.getPoints(40);
  const g=new THREE.BufferGeometry().setFromPoints(pts);
  const line=new THREE.Line(g,new THREE.LineBasicMaterial({color:col,transparent:true,opacity:.14}));
  line.userData={l,curve};LINK_GROUP.add(line);
  // flow particles (2 per link)
  const nP=Math.max(1,Math.round(dist/70)+1);
  for(let i=0;i<nP;i++){
    const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:glowTex,color:col,transparent:true,
      opacity:.95,blending:THREE.AdditiveBlending,depthWrite:false}));
    sp.scale.setScalar(6.5);LINK_GROUP.add(sp);
    flows.push({sp,curve,t:i/nP,speed:0.12+Math.random()*0.10,line,l,col});
  }
});

/* ---------- annotation cards ---------- */
const notes=[];
MODEL.annotations.forEach(a=>{
  const anc=nodesById[a.anchor]; if(!anc) return;
  const el=document.createElement('div');el.className='note '+a.kind;
  el.innerHTML='<div class="nt"><span class="tag">'+a.kind+'</span>'+a.title+'</div><div class="nx">'+a.text+'</div>';
  document.body.appendChild(el);
  el.addEventListener('click',()=>focusNode(anc));
  notes.push({el,pos:anc.position.clone().add(new THREE.Vector3(0,16,0)),anchor:anc});
});

/* ============================================================= */
/*  Custom orbit controls (mouse + touch)                       */
/* ============================================================= */
const target=new THREE.Vector3(0,18,0);
let radius=340, theta=0.9, phi=1.02; // spherical
let velT=0,velP=0;
function applyCam(){
  phi=Math.max(0.18,Math.min(1.52,phi));
  radius=Math.max(90,Math.min(900,radius));
  camera.position.set(
    target.x+radius*Math.sin(phi)*Math.cos(theta),
    target.y+radius*Math.cos(phi),
    target.z+radius*Math.sin(phi)*Math.sin(theta));
  camera.lookAt(target);
}
applyCam();
let dragging=false,panning=false,lastX=0,lastY=0;
const el=renderer.domElement;
el.addEventListener('mousedown',e=>{dragging=true;panning=e.button===2||e.shiftKey;lastX=e.clientX;lastY=e.clientY;});
addEventListener('mouseup',()=>{dragging=false;panning=false;});
addEventListener('mousemove',e=>{
  if(!dragging){onHover(e);return;}
  const dx=e.clientX-lastX,dy=e.clientY-lastY;lastX=e.clientX;lastY=e.clientY;
  if(panning){ panCam(dx,dy);} else { theta-=dx*0.005; phi-=dy*0.005; velT=-dx*0.0004; velP=-dy*0.0004; applyCam(); }
});
el.addEventListener('contextmenu',e=>e.preventDefault());
el.addEventListener('wheel',e=>{e.preventDefault();radius*=(1+Math.sign(e.deltaY)*0.08);applyCam();},{passive:false});
function panCam(dx,dy){
  const right=new THREE.Vector3().subVectors(camera.position,target).cross(camera.up).normalize();
  const up=camera.up.clone();
  const f=radius*0.0016;
  target.addScaledVector(right,-dx*f);target.addScaledVector(up,dy*f);applyCam();
}
// touch
let pinchD=0,touchMode='';
el.addEventListener('touchstart',e=>{
  if(e.touches.length===1){dragging=true;touchMode='rot';lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;
    onTapPick(e.touches[0]);}
  else if(e.touches.length===2){touchMode='pinch';pinchD=tdist(e);lastX=(e.touches[0].clientX+e.touches[1].clientX)/2;lastY=(e.touches[0].clientY+e.touches[1].clientY)/2;}
},{passive:false});
el.addEventListener('touchmove',e=>{e.preventDefault();
  if(touchMode==='rot'&&e.touches.length===1){const t=e.touches[0];const dx=t.clientX-lastX,dy=t.clientY-lastY;
    lastX=t.clientX;lastY=t.clientY;theta-=dx*0.006;phi-=dy*0.006;applyCam();}
  else if(touchMode==='pinch'&&e.touches.length===2){const d=tdist(e);radius*=pinchD/d;pinchD=d;
    const mx=(e.touches[0].clientX+e.touches[1].clientX)/2,my=(e.touches[0].clientY+e.touches[1].clientY)/2;
    panCam((mx-lastX)*0.6,(my-lastY)*0.6);lastX=mx;lastY=my;applyCam();}
},{passive:false});
el.addEventListener('touchend',()=>{dragging=false;touchMode='';});
function tdist(e){const a=e.touches[0],b=e.touches[1];return Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);}

/* ============================================================= */
/*  Picking / hover / focus                                     */
/* ============================================================= */
const ray=new THREE.Raycaster();const mouse=new THREE.Vector2();
let hovered=null, selected=null, focusSet=null;
const tip=document.getElementById('tip');
function pick(cx,cy){
  mouse.x=(cx/innerWidth)*2-1;mouse.y=-(cy/innerHeight)*2+1;
  ray.setFromCamera(mouse,camera);
  const hits=ray.intersectObjects(nodeMeshes,false);
  return hits.length?hits[0].object:null;
}
function onHover(e){
  const m=pick(e.clientX,e.clientY);
  if(m!==hovered){ hovered=m; document.body.style.cursor=m?'pointer':'default';
    if(m){tip.style.display='block';tip.querySelector('.tn').textContent=m.userData.name;
      tip.querySelector('.tc').textContent=MODEL.cats[m.userData.cat].label+(m.userData.shared?' · shared hub':'');}
    else tip.style.display='none';
  }
  if(m){tip.style.left=e.clientX+'px';tip.style.top=e.clientY+'px';}
}
function onTapPick(t){const m=pick(t.clientX,t.clientY);if(m)focusNode(m);}
el.addEventListener('click',e=>{const m=pick(e.clientX,e.clientY);if(m)focusNode(m);else clearFocus();});

// adjacency
const adj={};MODEL.links.forEach(l=>{(adj[l.a]=adj[l.a]||[]).push(l);(adj[l.b]=adj[l.b]||[]).push(l);});

function focusNode(m){
  selected=m;const s=m.userData;
  const set=new Set([s.id]);(adj[s.id]||[]).forEach(l=>{set.add(l.a);set.add(l.b);});
  focusSet=set;
  // glide target to node
  target.copy(m.position);radius=Math.max(120,Math.min(radius,220));applyCam();
  openDetail(s);
  applyDim();
}
function clearFocus(){selected=null;focusSet=null;applyDim();closeDetail();}

function applyDim(){
  nodeMeshes.forEach(m=>{
    const on=!focusSet||focusSet.has(m.userData.id);
    m.userData._mat.emissiveIntensity=on?.6:.12;
    m.userData._glow.material.opacity=on?(m.userData.shared?.9:.6):.08;
    m.userData._wf.material.opacity=on?.35:.06;
    const lb=m.userData._lbl;lb.classList.toggle('dim',!on);
  });
  LINK_GROUP.children.forEach(o=>{
    if(o.isLine){const l=o.userData.l;
      const on=!focusSet||(focusSet.has(l.a)&&focusSet.has(l.b)&&(l.a===(selected&&selected.userData.id)||l.b===(selected&&selected.userData.id)));
      o.material.opacity=focusSet? (on?.5:.03):.14;}
  });
  flows.forEach(f=>{const l=f.l;
    const on=!focusSet||(l.a===(selected&&selected.userData.id)||l.b===(selected&&selected.userData.id));
    f.sp.visible=flowsOn&&on&&catOn(nodesById[l.a].userData.cat);
    f.sp.material.opacity=on?.95:.12;});
}

/* ---------- detail panel ---------- */
const D={panel:document.getElementById('detail'),cat:document.getElementById('dcat'),name:document.getElementById('dname'),
  full:document.getElementById('dfull'),desc:document.getElementById('ddesc'),chips:document.getElementById('dchips'),
  flows:document.getElementById('dflows'),flowh:document.getElementById('dflowh')};
function openDetail(s){
  D.panel.classList.add('open');
  D.cat.textContent=MODEL.cats[s.cat].label;D.cat.style.color=CATCOLOR[s.cat];
  D.name.textContent=s.name;D.full.textContent=s.full;D.desc.textContent=s.desc;
  D.chips.innerHTML='';
  if(s.shared){const c=document.createElement('span');c.className='chip shared';c.textContent='Shared hub';D.chips.appendChild(c);}
  s.districts.forEach(did=>{const dm=MODEL.dmarkers.find(x=>x.id===did);
    const c=document.createElement('span');c.className='chip';c.textContent=(dm?dm.name:did).replace(' Ecosystem','');D.chips.appendChild(c);});
  const ls=adj[s.id]||[];D.flows.innerHTML='';D.flowh.style.display=ls.length?'block':'none';
  ls.forEach(l=>{
    const out=l.a===s.id;const other=nodesById[out?l.b:l.a];
    const row=document.createElement('div');row.className='flow';
    row.innerHTML='<span class="arr">'+(out?'▸':'◂')+'</span><div><div class="fname">'+other.userData.name+'</div><div class="flabel">'+l.label+'</div></div>';
    row.querySelector('.fname').style.color=CATCOLOR[other.userData.cat];
    row.addEventListener('click',()=>focusNode(other));
    D.flows.appendChild(row);
  });
}
function closeDetail(){D.panel.classList.remove('open');}
document.getElementById('dclose').addEventListener('click',clearFocus);

/* ============================================================= */
/*  Legend / filters                                            */
/* ============================================================= */
const catOnState={};Object.keys(MODEL.cats).forEach(k=>catOnState[k]=true);
const catOn=k=>catOnState[k];
const lgrows=document.getElementById('lgrows');
Object.entries(MODEL.cats).forEach(([k,v])=>{
  const cnt=MODEL.systems.filter(s=>s.cat===k).length;
  const row=document.createElement('div');row.className='lg';
  row.innerHTML='<span class="dot" style="color:'+v.color+'"></span><span class="n">'+v.label+'</span><span class="c">'+cnt+'</span>';
  row.addEventListener('click',()=>{catOnState[k]=!catOnState[k];row.classList.toggle('off',!catOnState[k]);applyCatFilter();});
  lgrows.appendChild(row);
});
function applyCatFilter(){
  nodeMeshes.forEach(m=>{const on=catOn(m.userData.cat);
    m.visible=on;m.userData._lbl.classList.toggle('hidden',!on||!labelsOn);});
  applyDim();
}

/* ---------- dock tools ---------- */
let flowsOn=true,labelsOn=true,notesOn=true;
const T={f:document.getElementById('t-flows'),l:document.getElementById('t-labels'),n:document.getElementById('t-notes'),r:document.getElementById('t-reset')};
T.f.addEventListener('click',()=>{flowsOn=!flowsOn;T.f.classList.toggle('on',flowsOn);applyDim();});
T.l.addEventListener('click',()=>{labelsOn=!labelsOn;T.l.classList.toggle('on',labelsOn);
  nodeMeshes.forEach(m=>m.userData._lbl.classList.toggle('hidden',!labelsOn||!m.visible));});
T.n.addEventListener('click',()=>{notesOn=!notesOn;T.n.classList.toggle('on',notesOn);});
T.r.addEventListener('click',()=>{clearFocus();target.set(0,18,0);radius=340;theta=0.9;phi=1.02;applyCam();});

/* ---------- search ---------- */
const searchEl=document.getElementById('search'),resEl=document.getElementById('results');
searchEl.addEventListener('input',()=>{
  const q=searchEl.value.trim().toLowerCase();resEl.innerHTML='';
  if(!q){resEl.style.display='none';return;}
  const hitList=MODEL.systems.filter(s=>s.name.toLowerCase().includes(q)||s.full.toLowerCase().includes(q)).slice(0,8);
  if(!hitList.length){resEl.style.display='none';return;}
  hitList.forEach(s=>{const r=document.createElement('div');r.className='r';
    r.innerHTML=s.name+'<small>'+s.full+'</small>';
    r.addEventListener('click',()=>{focusNode(nodesById[s.id]);resEl.style.display='none';searchEl.value=s.name;});
    resEl.appendChild(r);});
  resEl.style.display='block';
});
searchEl.addEventListener('blur',()=>setTimeout(()=>resEl.style.display='none',180));

/* ============================================================= */
/*  Project 3D -> screen for labels/notes                       */
/* ============================================================= */
const _v=new THREE.Vector3();
function project(p){
  _v.copy(p).project(camera);
  return {x:(_v.x*0.5+0.5)*innerWidth, y:(-_v.y*0.5+0.5)*innerHeight, z:_v.z};
}
function updateOverlays(){
  // node labels
  nodeMeshes.forEach(m=>{
    const lb=m.userData._lbl;
    if(!labelsOn||!m.visible){lb.style.display='none';return;}
    const s=project(m.position);
    if(s.z>1){lb.style.display='none';return;}
    lb.style.display='block';lb.style.left=s.x+'px';lb.style.top=(s.y-(m.userData.shared?20:15))+'px';
  });
  // district labels
  dLabels.forEach(d=>{const s=project(d.pos);
    if(s.z>1){d.el.style.display='none';return;}d.el.style.display='block';d.el.style.left=s.x+'px';d.el.style.top=s.y+'px';});
  // notes
  notes.forEach(n=>{
    const vis=notesOn && (!focusSet || focusSet.has(n.anchor.userData.id));
    if(!vis){n.el.classList.remove('show');return;}
    const s=project(n.pos);
    if(s.z>1){n.el.classList.remove('show');return;}
    n.el.classList.add('show');n.el.style.left=s.x+'px';n.el.style.top=s.y+'px';
  });
}

/* ============================================================= */
/*  Animate                                                     */
/* ============================================================= */
let last=performance.now();
function animate(now){
  requestAnimationFrame(animate);
  const dt=Math.min((now-last)/1000,0.05);last=now;
  // gentle auto-drift when idle
  if(!dragging){theta+=0.00028;applyCam();}
  // node bob + spin
  const t=now*0.001;
  nodeMeshes.forEach((m,i)=>{m.rotation.y+=dt*0.4;m.rotation.x=Math.sin(t*0.5+i)*0.08;
    const s=m.userData._base;const pulse=m.userData.shared?1+Math.sin(t*1.5+i)*0.04:1;
    m.userData._glow.scale.setScalar((m.userData.shared?42:26)*pulse);});
  // flows
  if(flowsOn){flows.forEach(f=>{if(!f.sp.visible)return;f.t=(f.t+f.speed*dt)%1;
    f.curve.getPoint(f.t,f.sp.position);});}
  // hover highlight
  nodeMeshes.forEach(m=>{const h=(m===hovered||m===selected);
    m.scale.setScalar(THREE.MathUtils.lerp(m.scale.x,h?1.35:1,0.2));});
  updateOverlays();
  renderer.render(scene,camera);
}
requestAnimationFrame(animate);

addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);});

// reveal
setTimeout(()=>document.getElementById('loader').classList.add('gone'),700);
setTimeout(()=>document.getElementById('loader').remove(),1400);
</script>
</body>
</html>
